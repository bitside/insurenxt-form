name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject build-time secrets into form JS
        env:
          S3_UPLOAD_BASE_URL: ${{ secrets.S3_UPLOAD_BASE_URL }}
        run: |
          python3 -c "
          import os, pathlib
          f = pathlib.Path('submit.js')
          f.write_text(f.read_text().replace('__S3_UPLOAD_BASE_URL__', os.environ['S3_UPLOAD_BASE_URL']))
          "

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
